blueprint:
  name: BfS ODL – Reference range notification / Referenzbereich-Benachrichtigung
  description: >
    Triggers when a BfS ODL assessment sensor remains in a selected raw state for a
    defined time. Depending on whether the integration uses the default natural
    thresholds or custom user thresholds, the sensor may use these raw states:
    above_natural_range, below_natural_range, within_natural_range,
    above_configured_range, below_configured_range, within_configured_range,
    no_data.
  domain: automation
  input:
    assessment_sensor:
      name: Assessment sensor / Bewertungssensor
      description: Select the sensor "Measurement assessment / Messwertbewertung" from the BfS ODL integration.
      selector:
        entity:
          filter:
            - integration: bfs_odl
              domain: sensor
    target_state:
      name: Target state / Zielzustand
      description: Raw state to monitor.
      default: above_natural_range
      selector:
        select:
          options:
            - above_natural_range
            - below_natural_range
            - within_natural_range
            - above_configured_range
            - below_configured_range
            - within_configured_range
            - no_data
          mode: dropdown
    duration_minutes:
      name: Duration in minutes / Dauer in Minuten
      description: State must remain active for this duration before triggering.
      default: 30
      selector:
        number:
          min: 1
          max: 1440
          step: 1
          unit_of_measurement: min
          mode: box
    actions:
      name: Actions / Aktionen
      description: Actions executed when the automation fires.
      selector:
        action: {}

mode: single

trigger:
  - platform: state
    entity_id: !input assessment_sensor
    to: !input target_state
    for:
      minutes: !input duration_minutes

condition: []

action: !input actions
