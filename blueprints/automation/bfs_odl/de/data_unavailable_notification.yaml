blueprint:
  name: BfS ODL – Daten nicht verfügbar
  description: >
    Löst aus, wenn ein ausgewählter Sensor der BfS-ODL-Integration länger
    unknown oder unavailable ist.
  domain: automation
  input:
    monitored_sensor:
      name: Zu überwachender Sensor
      description: Wähle einen Sensor aus der BfS-ODL-Integration.
      selector:
        entity:
          filter:
            - integration: bfs_odl
              domain: sensor
    unavailable_for_minutes:
      name: Dauer in Minuten
      description: Der Sensorzustand muss so lange unknown oder unavailable sein.
      default: 60
      selector:
        number:
          min: 1
          max: 10080
          step: 1
          unit_of_measurement: min
          mode: box
    actions:
      name: Aktionen
      description: Aktionen, die beim Auslösen ausgeführt werden.
      selector:
        action: {}

mode: single

trigger:
  - platform: state
    entity_id: !input monitored_sensor
    to: unavailable
    for:
      minutes: !input unavailable_for_minutes
  - platform: state
    entity_id: !input monitored_sensor
    to: unknown
    for:
      minutes: !input unavailable_for_minutes

condition: []

action: !input actions
