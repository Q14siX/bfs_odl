blueprint:
  name: BfS ODL – Sudden change
  description: >
    Triggers when the numeric Gamma ODL value of a BfS ODL sensor changes by at
    least the configured amount compared to the previous state.
  domain: automation
  input:
    odl_sensor:
      name: Gamma ODL sensor
      description: Select the primary Gamma ODL sensor (1h) from the BfS ODL integration.
      selector:
        entity:
          filter:
            - integration: bfs_odl
              domain: sensor
    delta_threshold:
      name: Minimum change
      description: Absolute change in µSv/h between the old and the new state.
      default: 0.03
      selector:
        number:
          min: 0.001
          max: 5
          step: 0.001
          unit_of_measurement: µSv/h
          mode: box
    actions:
      name: Actions
      description: Actions executed when the automation fires.
      selector:
        action: {}

mode: single

trigger:
  - platform: state
    entity_id: !input odl_sensor

variables:
  delta_threshold: !input delta_threshold

condition:
  - condition: template
    value_template: >
      {{ trigger.from_state is not none
         and trigger.to_state is not none
         and trigger.from_state.state not in ['unknown', 'unavailable', 'none', 'None']
         and trigger.to_state.state not in ['unknown', 'unavailable', 'none', 'None']
         and (trigger.to_state.state | float(0) - trigger.from_state.state | float(0)) | abs >= delta_threshold | float(0) }}

action: !input actions
